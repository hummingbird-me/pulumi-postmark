name: Publish SDKs

# Publishes the per-language SDK packages on a version tag. Each job BUILDS the
# SDK unconditionally (so a broken SDK fails CI) but only PUBLISHES when the
# relevant secret is present — so this workflow is safe to merge before you have
# set any registry up, and each language turns on the moment you add its secret.
#
# Secrets used (Settings → Secrets and variables → Actions):
#   NPM_TOKEN      npm automation token for the @hummingbird-me scope
#   PYPI_TOKEN     PyPI API token (project- or account-scoped)
#   NUGET_API_KEY  nuget.org API key
#
# Note: the published package versions come from the committed SDK sources, so
# regenerate them at the new version before tagging (see docs/RELEASING.md):
#   make schema build_sdks VERSION=X.Y.Z && git commit -am "chore: SDKs for vX.Y.Z"
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  npm:
    name: npm (@hummingbird-me/postmark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build
        run: |
          cd sdk/nodejs
          npm install
          npm run build
          cp ../../README.md package.json bin/
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."; exit 0
          fi
          cd sdk/nodejs/bin
          npm publish --access public

  pypi:
    name: PyPI (hummingbird-me-postmark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build
        run: |
          python -m pip install --upgrade build
          cd sdk/python
          python -m build
      - name: Publish
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PYPI_TOKEN:-}" ]; then
            echo "PYPI_TOKEN not set — skipping PyPI publish."; exit 0
          fi
          python -m pip install --upgrade twine
          python -m twine upload --non-interactive -u __token__ -p "$PYPI_TOKEN" sdk/python/dist/*

  nuget:
    name: NuGet (HummingbirdMe.Postmark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build & pack
        run: |
          cd sdk/dotnet
          dotnet build -c Release
          dotnet pack -c Release -o out
      - name: Publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY not set — skipping NuGet publish."; exit 0
          fi
          dotnet nuget push "sdk/dotnet/out/*.nupkg" \
            -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate

  # Java / Maven Central is intentionally omitted — it needs a Sonatype Central
  # account, a verified namespace (e.g. io.github.hummingbird-me), and GPG
  # signing. See docs/RELEASING.md for how to add it later.
