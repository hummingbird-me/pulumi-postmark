name: Publish SDKs

# Publishes the SDK packages on a version tag. Only npm is wired up today
# (@kitsu-io/pulumi-postmark), via OIDC "trusted publishing" — no NPM_TOKEN.
# This requires a ONE-TIME bootstrap publish of the package and a Trusted
# Publisher configured for it on npmjs.com (repo + this workflow file); see
# docs/RELEASING.md. PyPI / NuGet / Maven can be added later as more jobs.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  npm:
    name: npm (@kitsu-io/pulumi-postmark)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: required for npm trusted publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Ensure npm new enough for OIDC trusted publishing
        run: npm install -g npm@latest # OIDC needs npm >= 11.5.1
      - name: Build
        run: |
          cd sdk/nodejs
          npm install
          npm run build
          cp ../../README.md ../../LICENSE package.json bin/
      - name: Publish (OIDC trusted publishing; provenance is automatic)
        run: cd sdk/nodejs/bin && npm publish --access public
