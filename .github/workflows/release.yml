name: Release

# Fires on a semver tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# GoReleaser builds the plugin binaries for every platform and publishes a GitHub
# Release with them (where the schema's pluginDownloadURL fetches from). A second
# job tags the Go SDK module so `go get .../sdk/go/pulumi-postmark@vX.Y.Z` resolves.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser (plugin binaries + GitHub Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-sdk-tag:
    name: Tag Go SDK module
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Push sdk/go/pulumi-postmark/<version> tag
        run: |
          set -euo pipefail
          SDK_TAG="sdk/go/pulumi-postmark/${GITHUB_REF_NAME}"
          if git rev-parse -q --verify "refs/tags/${SDK_TAG}" >/dev/null; then
            echo "${SDK_TAG} already exists — nothing to do."; exit 0
          fi
          git tag "${SDK_TAG}"
          git push origin "${SDK_TAG}"
