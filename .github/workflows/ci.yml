name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
      - name: Lint
        run: "$(go env GOPATH)/bin/golangci-lint run --config .golangci.yml ./provider/..."

  provider:
    name: Build · test · schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Pulumi CLI + pulumictl
        run: |
          curl -fsSL https://get.pulumi.com | sh -s -- --version "$(cat .pulumi.version)"
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"
          go install github.com/pulumi/pulumictl/cmd/pulumictl@v0.0.50
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Test
        run: make test_provider
      - name: Schema is up to date
        run: |
          make provider
          pulumi package get-schema "$PWD/bin/pulumi-resource-postmark" | jq 'del(.version)' > /tmp/schema.json
          if ! diff -u provider/cmd/pulumi-resource-postmark/schema.json /tmp/schema.json; then
            echo "::error::schema.json is stale — run 'make codegen' and commit the result."
            exit 1
          fi
      - name: Example builds
        run: cd examples/simple && go build ./...
