name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  provider:
    name: Provider (build · vet · fmt · test · schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: gofmt
        run: |
          unformatted="$(gofmt -l provider)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: cd provider && go vet ./...

      - name: Test
        run: cd provider && go test ./...

      - name: Schema is up to date
        run: |
          make schema
          if ! git diff --exit-code -- provider/cmd/pulumi-resource-postmark/schema.json; then
            echo "::error::schema.json is stale — run 'make schema' and commit the result."
            exit 1
          fi

  sdk-go:
    name: Go SDK (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go.mod
          cache-dependency-path: sdk/go.sum
      - run: cd sdk && go build ./...

  example:
    name: Example (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/simple/go.mod
          cache-dependency-path: examples/simple/go.sum
      - run: cd examples/simple && go build ./...
